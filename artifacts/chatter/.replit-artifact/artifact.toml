kind = "web"
previewPath = "/"
title = "Chatter"
version = "1.0.0"
id = "artifacts/chatter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18863

[services.development]
run = "pnpm --filter @workspace/chatter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chatter", "run", "build" ]
publicDir = "artifacts/chatter/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18863"
BASE_PATH = "/"
